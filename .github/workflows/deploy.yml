name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - "**"

# Cancel any in-flight deploy for the same branch when a new push lands.
concurrency:
  group: cf-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Cloudflare decides production vs preview based on whether the branch
      # name matches the project's configured production branch ('main').
      # Branches with slashes (e.g. claude/foo) work — Cloudflare normalizes
      # the slash to a hyphen for the preview subdomain.
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=epig-dashboard --branch=${{ github.ref_name }} --commit-dirty=true
